version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  # ── HTTP API để mcp_profile_lookup (project khác) gọi vào ──
  rag_api:
    build: .
    depends_on:
      - qdrant
    ports:
      - "8091:8091"
    environment:
      QDRANT_URL: http://qdrant:6333
      SYNC_DB_PATH: /app/data/sync_state.db
    volumes:
      - ./data:/app/data
    command: uvicorn main:app --host 0.0.0.0 --port 8091

  # ── Cron đồng bộ dữ liệu định kỳ (mỗi giờ) ──
  rag_sync:
    build: .
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: http://qdrant:6333
      ARCHIVE_API_BASE_URL: http://192.168.1.46:4000
      SYNC_DB_PATH: /app/data/sync_state.db
    volumes:
      - ./data:/app/data
    entrypoint: >
      sh -c "while true; do python ingestion/ingest.py; echo 'Chờ 3600s...'; sleep 3600; done"

volumes:
  qdrant_data:
