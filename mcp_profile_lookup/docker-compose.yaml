version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  mcp_server:
    build: .
    depends_on:
      - qdrant
    ports:
      - "8090:8090"
    environment:
      QDRANT_URL: http://qdrant:6333
      ARCHIVE_API_BASE_URL: http://192.168.1.46:4000
      SYNC_DB_PATH: /app/data/sync_state.db
    volumes:
      - ./data:/app/data
    command: python src/server.py

  # Cron đồng bộ dữ liệu định kỳ (mỗi giờ). Đổi "sleep 3600" nếu cần tần suất khác.
  sync_cron:
    build: .
    depends_on:
      - qdrant
    environment:
      QDRANT_URL: http://qdrant:6333
      ARCHIVE_API_BASE_URL: http://192.168.1.46:4000
      SYNC_DB_PATH: /app/data/sync_state.db
    volumes:
      - ./data:/app/data
    entrypoint: >
      sh -c "while true; do python src/ingestion/sync_job.py; echo 'Chờ 3600s...'; sleep 3600; done"

volumes:
  qdrant_data:
